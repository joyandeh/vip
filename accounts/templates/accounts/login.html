{% extends 'core/base.html' %}

{% block title %}tronlnd | ورود به حساب کاربری{% endblock %}

{% block extra_css %}
<style>
    /* استایل‌دهی مستقیم به فیلدهای تولید شده توسط {{ form.as_p }} جنگو */
    .django-form-wrapper p {
        margin-bottom: 1.25rem;
        display: flex;
        flex-direction: column;
    }

    .django-form-wrapper label {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 6px;
        font-weight: 500;
        text-align: right;
    }

    .django-form-wrapper input {
        width: 100%;
        padding: 12px 16px;
        background-color: rgba(11, 14, 20, 0.8) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 14px;
        color: #ffffff !important;
        font-size: 0.95rem;
        transition: all 0.2s ease;
        outline: none;
    }

    .django-form-wrapper input:focus {
        border-color: var(--accent-cyan) !important;
        box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.1) !important;
    }

    /* اگر اروری از سمت فرم جنگو برگشت داده شود */
    .django-form-wrapper .errorlist {
        list-style: none;
        padding-right: 0;
        margin-bottom: 15px;
        font-size: 0.8rem;
        color: var(--accent-coral);
        background: rgba(255, 82, 82, 0.1);
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 82, 82, 0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 180px);">
    
    <div class="glass-card p-4 w-100 position-relative overflow-hidden" style="max-width: 380px;">
        
        <div class="position-absolute top-0 start-50 translate-middle-x" style="width: 100px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);"></div>
        
        <div class="text-center mb-4">
            <div class="login-icon-box d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px; background: rgba(0, 225, 255, 0.05); border: 1px solid rgba(0, 225, 255, 0.15); border-radius: 18px;">
                <i class="fa-solid fa-shield-halved h3 mb-0 text-cyan"></i>
            </div>
            <h5 class="fw-bold text-white mb-1">ورود به حساب کاربری</h5>
            <p class="text-custom-muted small mb-0">خوش آمدید، مشخصات خود را وارد کنید</p>
        </div>

        <form method="post" class="django-form-wrapper">
            {% csrf_token %}
            
            {{ form.as_p }}

            <button type="submit" class="btn btn-modern btn-modern-primary w-100 py-3 mt-2 fw-bold text-dark">
                <i class="fa-solid fa-arrow-right-to-bracket me-1"></i> ورود به پلتفرم
            </button>
        </form>

        <div class="text-center mt-4 pt-3" style="border-top: 1px solid var(--border-glass);">
            <span class="text-custom-muted small">هنوز ثبت نام نکرده‌اید؟</span>
            <a href="/accounts/register/" class="text-cyan small td-none ms-1 fw-bold">ایجاد حساب جدید</a>
        </div>

    </div>
</div>
{% endblock %}
